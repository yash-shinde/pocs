spring:
  application:
    name: resilient-order-processing-platform
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orders_db}
    username: ${DB_USERNAME:orders}
    password: ${DB_PASSWORD:orders}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        auto-startup: true
server:
  port: ${SERVER_PORT:8080}
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} correlationId=%X{correlationId} - %msg%n"
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
app:
  async:
    core-pool-size: 4
    max-pool-size: 16
    queue-capacity: 200
  messaging:
    rabbit-enabled: true
  failure-simulation:
    inventory-failure-rate: 0.25
    notification-failure-rate: 0.15
resilience4j:
  retry:
    instances:
      inventory:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - com.learning.resilientorders.exception.TemporaryDependencyException
      notification:
        maxAttempts: 2
        waitDuration: 300ms
        retryExceptions:
          - com.learning.resilientorders.exception.TemporaryDependencyException
  circuitbreaker:
    instances:
      notification:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
